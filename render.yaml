services:
  - type: web
    name: ai-interview-coach-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    branch: main
    plan: starter
    envVars:
      - key: DATABASE_URL
        value: ""
      - key: SECRET_KEY
        value: "change-me-in-production"
      - key: GEMINI_API_KEY
        value: ""
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
