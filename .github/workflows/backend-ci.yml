name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black isort flake8 pytest pytest-cov pip-audit

      - name: Lint: black
        working-directory: backend
        run: black --check .

      - name: Lint: isort
        working-directory: backend
        run: isort --check-only .

      - name: Lint: flake8
        working-directory: backend
        run: flake8 .

      - name: Run tests with coverage
        working-directory: backend
        run: pytest --maxfail=1 --disable-warnings -q --cov=app --cov-report=xml

      - name: Security scan (pip-audit)
        working-directory: backend
        run: pip-audit --progress-spinner=off

      - name: Apply Alembic migrations (test)
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./dev.db
        run: |
          alembic upgrade head

      - name: Docker build check
        working-directory: backend
        run: docker build -t ai-interview-coach-backend:ci .

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
